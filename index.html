<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Glowing Sphere</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
        }

        .instructions {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="instructions">Move your mouse to interact with the sphere</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // Scene setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Camera
        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.z = 3;

        // Renderer
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            alpha: true 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.5;
        container.appendChild(renderer.domElement);

        // Post-processing for glow effect
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5,  // strength
            0.4,  // radius
            0.85  // threshold
        );
        composer.addPass(bloomPass);

        // Create the glowing sphere
        const sphereGeometry = new THREE.SphereGeometry(1, 64, 64);
        
        // Custom shader material for the glow effect
        const sphereMaterial = new THREE.MeshStandardMaterial({
            color: 0x4488ff,
            emissive: 0x2266cc,
            emissiveIntensity: 0.5,
            metalness: 0.3,
            roughness: 0.2,
        });

        const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
        scene.add(sphere);

        // Create inner glow sphere
        const innerSphereGeometry = new THREE.SphereGeometry(0.85, 32, 32);
        const innerSphereMaterial = new THREE.MeshBasicMaterial({
            color: 0x88ccff,
            transparent: true,
            opacity: 0.3,
        });
        const innerSphere = new THREE.Mesh(innerSphereGeometry, innerSphereMaterial);
        sphere.add(innerSphere);

        // Add point light inside the sphere
        const pointLight = new THREE.PointLight(0x4488ff, 2, 10);
        pointLight.position.set(0, 0, 0);
        sphere.add(pointLight);

        // Ambient light
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        // Directional lights for more dynamic lighting
        const directionalLight1 = new THREE.DirectionalLight(0x4488ff, 1);
        directionalLight1.position.set(5, 5, 5);
        scene.add(directionalLight1);

        const directionalLight2 = new THREE.DirectionalLight(0xff4488, 0.5);
        directionalLight2.position.set(-5, -5, -5);
        scene.add(directionalLight2);

        // Mouse tracking variables
        let mouseX = 0;
        let mouseY = 0;
        let targetRotationX = 0;
        let targetRotationY = 0;

        // Track mouse movement
        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = (event.clientY / window.innerHeight) * 2 - 1;
            
            // Calculate target rotations based on mouse position
            targetRotationY = mouseX * Math.PI * 0.5;
            targetRotationX = mouseY * Math.PI * 0.3;
        });

        // Add particle field for background ambiance
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 1000;
        const positions = new Float32Array(particlesCount * 3);

        for (let i = 0; i < particlesCount * 3; i += 3) {
            positions[i] = (Math.random() - 0.5) * 20;
            positions[i + 1] = (Math.random() - 0.5) * 20;
            positions[i + 2] = (Math.random() - 0.5) * 20;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.02,
            color: 0x4488ff,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending,
        });

        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            // Base auto-rotation
            const time = Date.now() * 0.001;
            sphere.rotation.z = time * 0.2;

            // Smooth mouse interaction
            sphere.rotation.y += (targetRotationY - sphere.rotation.y) * 0.05;
            sphere.rotation.x += (targetRotationX - sphere.rotation.x) * 0.05;

            // Additional spinning effect
            sphere.rotation.y += 0.005;
            sphere.rotation.x += 0.003;

            // Animate inner sphere
            innerSphere.rotation.y = -time * 0.5;
            innerSphere.rotation.x = time * 0.3;

            // Pulsing glow effect
            const pulse = Math.sin(time * 2) * 0.2 + 0.8;
            sphereMaterial.emissiveIntensity = pulse * 0.5;
            pointLight.intensity = pulse * 2;

            // Rotate particles slowly
            particles.rotation.y = time * 0.05;
            particles.rotation.x = time * 0.02;

            // Color shift based on mouse position
            const hue = (mouseX + 1) * 0.3 + 0.5;
            const color = new THREE.Color().setHSL(hue, 0.7, 0.5);
            sphereMaterial.emissive.copy(color);
            pointLight.color.copy(color);

            // Render with post-processing
            composer.render();
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start animation
        animate();
    </script>
</body>
</html>
