<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>AI Assistant</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }\n        #chat-window { height: 400px; border: 1px solid #ccc; padding: 10px; overflow-y: scroll; }\n        #input-section { display: flex; margin-top: 10px; }\n        #input-section input { flex: 1; padding: 10px; }\n        #input-section button { padding: 10px; }\n        #tasks-section { margin-top: 20px; }\n    </style>\n</head>\n<body>\n    <h1>AI Assistant</h1>\n    <div id="chat-window"></div>\n    <div id="input-section">\n        <input type="text" id="user-input" placeholder="Type your message here..."><button id="send-button">Send</button>\n    </div>\n    <div id="tasks-section">\n        <h2>Tasks</h2>\n        <ul id="task-list"></ul>\n    </div>\n    <script>\n        document.getElementById('send-button').addEventListener('click', function() {\n            const userInput = document.getElementById('user-input').value;\n            const chatWindow = document.getElementById('chat-window');\n            chatWindow.innerHTML += `<div>User: ${userInput}</div>`;\n            document.getElementById('user-input').value = '';\n            // Here you would add logic to process the input and show AI response\n        });\n    </script>\n</body>\n</html>
